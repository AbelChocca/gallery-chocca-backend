name: Backend CI/CD

on:
  push:
    branches:
      - main
      - dev

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: backend_jean

jobs:
  test:
    name: Lint and Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
      POSTGRES_DB: test_db
      REDIS_URL: redis://localhost:6379/0
      PYTHONPATH: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff
        run: |
          uv run ruff check .

      - name: Enable PostgreSQL extensions
        run: |
          PGPASSWORD=postgres psql \
            -h localhost \
            -U postgres \
            -d test_db \
            -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

          PGPASSWORD=postgres psql \
            -h localhost \
            -U postgres \
            -d test_db \
            -c "CREATE EXTENSION IF NOT EXISTS unaccent;"

      - name: Run tests
        run: |
          uv run pytest tests/integration tests/unit

  deploy:
    name: Build and Deploy
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set image tag
        id: vars
        run: |
          echo "TAG=${GITHUB_SHA:7}" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build \
            -f Dockerfile.prod \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.TAG }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push image
        run: |
          docker push \
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.TAG }}

          docker push \
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ secrets.CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/backend_jean:${{ steps.vars.outputs.TAG }}

      - name: Cleanup old images
        run: |
          TAGS=$(az acr repository show-tags \
            --name ${{ secrets.ACR_NAME }} \
            --repository ${{ env.IMAGE_NAME }} \
            --orderby time_desc \
            --output tsv)

          COUNT=0

          for TAG in $TAGS; do
            if [ "$TAG" = "latest" ]; then
              continue
            fi

            COUNT=$((COUNT + 1))

            if [ $COUNT -gt 20 ]; then
              echo "Deleting tag $TAG"

              az acr repository delete \
                --name ${{ secrets.ACR_NAME }} \
                --image ${{ env.IMAGE_NAME }}:$TAG \
                --yes
            fi
          done
