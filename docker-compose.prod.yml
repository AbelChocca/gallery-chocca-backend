version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always 
    env_file:
      - .env
    command: postgres -c shared_buffers=64MB -c work_mem=4MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  redis:
    image: redis:7
    restart: always
    container_name: redis_cache
    command: redis-server --maxmemory 50mb --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  amd-app:
    container_name: backend_app
    build: 
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data: